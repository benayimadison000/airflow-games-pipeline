name: Validate Airflow DAGs

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  validate-dags:
    name: Validate DAG syntax
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-airflow
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install apache-airflow==2.10.4 \
            apache-airflow-providers-postgres \
            requests \
            pandas \
            sqlalchemy \
            psycopg2-binary \
            --constraint "https://raw.githubusercontent.com/apache/airflow/constraints-2.10.4/constraints-3.12.txt"

      - name: Set Airflow environment
        run: |
          echo "AIRFLOW__CORE__LOAD_EXAMPLES=False" >> $GITHUB_ENV
          echo "AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=sqlite:////tmp/airflow.db" >> $GITHUB_ENV
          echo "AIRFLOW__CORE__EXECUTOR=SequentialExecutor" >> $GITHUB_ENV
          echo "AIRFLOW_HOME=/tmp/airflow" >> $GITHUB_ENV

      - name: Initialise Airflow DB
        run: airflow db migrate

      - name: Validate DAG files
        run: python scripts/validate_dags.py

      - name: List DAGs
        run: |
          AIRFLOW__CORE__DAGS_FOLDER=$(pwd)/airflow/dags airflow dags list